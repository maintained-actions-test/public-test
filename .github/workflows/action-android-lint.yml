name: action-android-lint

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create sample lint report
        run: |
          mkdir -p build/reports
          cat > build/reports/lint-results.xml << 'LINTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <issues format="6" by="lint 7.4.0">
            <issue
              id="HardcodedText"
              severity="Warning"
              message="Hardcoded string should use @string resource"
              category="Internationalization"
              priority="5"
              summary="Hardcoded text"
              explanation="Hardcoding a string in a layout file prevents proper localization.">
              <location
                file="app/src/main/res/layout/activity_main.xml"
                line="10"
                column="5"/>
            </issue>
          </issues>
          LINTEOF

      - name: Run Android Lint
        uses: step-security/action-android-lint@main
        with:
          report-path: build/reports/lint-results.xml
          ignore-warnings: 'false'
