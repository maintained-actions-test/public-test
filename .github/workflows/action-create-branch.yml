
name: action-create-branch

on:
  workflow_dispatch:
    inputs:
      branch_name:
        description: "Branch name to create"
        required: false
        default: "release-candidate"
      sha:
        description: "Optional SHA (leave empty to use current commit)"
        required: false

jobs:
  test-create-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create branch using action
        id: create_branch
        uses: step-security/action-create-branch@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: ${{ github.event.inputs.branch_name }}
          sha: ${{ github.event.inputs.sha }}

      - name: Print result
        run: |
          echo "Branch created: ${{ steps.create_branch.outputs.created }}"
