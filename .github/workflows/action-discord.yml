name: action-discord

on:
  workflow_dispatch:
    inputs:
      webhook-url:
        description: "Webhook URL"
        required: true
        default: "https://eoo0bqka4hwi4ar.m.pipedream.net/"

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: action-discord
        uses: step-security/action-discord@main
        env:
          DISCORD_WEBHOOK: ${{ inputs.webhook-url }}
        with:
          args: "workflow-playground just triggered a test runc"
