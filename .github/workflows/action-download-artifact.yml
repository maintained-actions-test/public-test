name: action-download-artifact

on: 
  workflow_dispatch:


jobs:
  uplopad-latest:
    runs-on: ubuntu-latest
    steps:          
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dump
        run: |
          mkdir artifact
          echo $GITHUB_SHA > artifact/sha
      - name: Upload
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: artifact
          path: artifact

  wait:
    runs-on: ubuntu-latest
    needs: uplopad-latest
    steps:
      - name: Wait for upload workflow
        run: sleep 10

  download-latest:
    runs-on: ubuntu-latest
    needs: wait
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Download
        uses: step-security/action-download-artifact@main
        with:
          workflow: action-download-artifact.yml
          run_id: ${{ github.run_id }}
          workflow_conclusion: ""
          name: artifact
          path: artifact
      - name: Test
        run: cat artifact/sha | grep $GITHUB_SHA
