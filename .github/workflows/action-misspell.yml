name: action-misspell

on: 
  workflow_dispatch:
  pull_request:

jobs:
  check-spelling:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: spellcheck
        uses: step-security/action-misspell@main
        with: 
          github_token: ${{ secrets.GITHUB_TOKEN }}
          locale: "US"
          pattern: "*.md"
          fail_level: warning
          filter_mode: nofilter
