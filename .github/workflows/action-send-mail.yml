name: action-send-mail

on: 
  workflow_dispatch:

jobs:
  main:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - subject: Plain body (attachment)
            attachments: main.go
            body: |
              first line
              second line
          - subject: HTML body (attachments)
            attachments: package.json
            html_body: |
              <!DOCTYPE html>
              <html>
              <body>
              <h1>Heading</h1>
              <p>Paragraph</p>
              </body>
              </html>
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send mail
        uses: step-security/action-send-mail@main
        with:
          server_address: ${{ secrets.ADDRESS }}
          server_port: 465
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          subject: ${{ matrix.subject }}
          body: ${{ matrix.body }}
          html_body: ${{ matrix.html_body }}
          to: varunsh@stepsecurity.io, rajkumar@stepsecurity.io
          from: StepSecurityBot <bot@stepsecurity.io>
          attachments: ${{ matrix.attachments }}
          convert_markdown: ${{ matrix.convert_markdown }}
          priority: high
          nodemailerlog: true
          nodemailerdebug: true

      - name: Warn user to check inbox
        if: always()
        run: |
          echo "::warning::main - 📬 Check your mail inbox for: '${{ matrix.subject }}'. ❗ If not received, something likely failed silently."

  url-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send mail
        uses: step-security/action-send-mail@main
        with:
          connection_url: smtp+starttls://${{ secrets.USERNAME }}:${{ secrets.PASSWORD }}@${{ secrets.ADDRESS }}/
          subject: Plain body with connection_url
          body: |
            first line
            second line
          to: varunsh@stepsecurity.io, rajkumar@stepsecurity.io
          from: StepSecurityBot <bot@stepsecurity.io>
          nodemailerlog: true
          nodemailerdebug: true

      - name: Warn user to check inbox
        if: always()
        run: |
          echo "::warning::url-test — 📬 Check your mail inbox for: 'Plain body with connection_url'. ❗ If not received, something likely failed silently."
