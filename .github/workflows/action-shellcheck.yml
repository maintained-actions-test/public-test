name: action-shellcheck
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  shellcheck-main:
    name: ShellCheck (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create test shell script
        run: |
          mkdir -p shellcheck-test
          cat > shellcheck-test/sample.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          greeting="hello"
          echo "${greeting} world"
          EOF
      - name: Run ShellCheck
        uses: step-security/action-shellcheck@main
        with:
          scandir: "./shellcheck-test"
          severity: "error"
          format: "gcc"
          check_together: "yes"
