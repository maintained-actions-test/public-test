name: "actions-codespell"

on:
  workflow_dispatch:

jobs:
  spellcheck-main:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run StepSecurity Codespell
        uses: step-security/actions-codespell@main
        with:
          path: "."
          check_filenames: true
          check_hidden: true
          skip: "node_modules,dist,build,*.min.js"
          builtin: "clear,rare"
          ignore_words_list: "abandonned,ackward,teh"
          ignore_words_file: ".codespellignore"
          uri_ignore_words_list: "*"
          only_warn: "1"
