name: actions-comment-pull-request
on:
  workflow_dispatch:

jobs:
  test_comment_pr:
    name: Comment PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: (BEFORE) Setup test cases
        run: echo '**Content of file referenced with absolute path**' > /tmp/foobar.txt

      - name: Comment PR with message
        uses: step-security/actions-comment-pull-request@main
        id: nrt-message
        with:
          pr-number: ${{ github.event.inputs.pr-number }}
          message: |
            Current branch is `${{ github.ref_name }}`.
            _(execution **${{ github.run_id }}** / attempt **${{ github.run_attempt }}**)_
          comment-tag: nrt-message
          reactions: eyes, rocket
          mode: recreate
