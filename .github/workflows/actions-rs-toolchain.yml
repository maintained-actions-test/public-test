name: actions-rs-toolchain

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        id: rust
        uses: step-security/actions-rs-toolchain@main
        with:
          toolchain: nightly
          profile: minimal
          override: true
          components: rustfmt, clippy

