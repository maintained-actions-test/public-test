name: audit-check
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  issues: write
  checks: write
jobs:
  audit-main:
    name: Audit Check (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Run Security Audit
        uses: step-security/audit-check@release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: "."
