name: aws-secretsmanager-get-secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run aws-secretsmanager-get-secrets
        uses: step-security/aws-secretsmanager-get-secrets@main
        with:
          secret-ids: ""
