name: azure-login
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  id-token: write
jobs:
  azure-login-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Azure Login (dummy creds, expected to fail at az login)
        uses: step-security/azure-login@main
        with:
          client-id: "00000000-0000-0000-0000-000000000000"
          tenant-id: "00000000-0000-0000-0000-000000000000"
          subscription-id: "00000000-0000-0000-0000-000000000000"
