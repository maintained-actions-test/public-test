name: cancel-action

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  cancel-job:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Cancel workflow
        id: cancel
        uses: step-security/cancel-action@main

      - name: Confirm cancel step executed
        run: echo "Cancel step executed, workflow should now terminate."
