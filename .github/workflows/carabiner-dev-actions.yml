name: carabiner-dev-actions

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  # ── main branch jobs (commented out) ──────────────────────────
  ampel-verify-main:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download bnd binary as test subject
        shell: bash
        run: |
          curl -sSfL -o /tmp/bnd \
            "https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/bnd-v0.4.1-linux-amd64"

      - name: Verify bnd with ampel/verify
        uses: step-security/carabiner-dev-actions/ampel/verify@main
        with:
          subject: /tmp/bnd
          collector: https://github.com/carabiner-dev/bnd/releases/download/v0.4.1/attestations.jsonl
          policy: "git+https://github.com/carabiner-dev/policies#slsa/has-attestation.json"
          attest: "false"

  install-ampel-main:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install ampel
        uses: step-security/carabiner-dev-actions/install/ampel@main

      - name: Verify ampel runs
        shell: bash
        run: ampel version

  install-bnd-main:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install bnd
        uses: step-security/carabiner-dev-actions/install/bnd@main

      - name: Verify bnd runs
        shell: bash
        run: bnd version

  install-ampel-bootstrap-main:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Bootstrap ampel
        id: bootstrap
        uses: step-security/carabiner-dev-actions/install/ampel-bootstrap@main

      - name: Verify bootstrap ampel runs
        shell: bash
        env:
          AMPEL_PATH: ${{ steps.bootstrap.outputs.ampel-path }}
        run: |
          "$AMPEL_PATH" version

  install-download-and-verify-main:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download and verify snappy
        uses: step-security/carabiner-dev-actions/install/download-and-verify@main
        with:
          tool: snappy
          version: v0.2.4
          attestation-file: snappy-v0.2.4.provenance.json

      - name: Verify snappy is on PATH
        shell: bash
        run: snappy version
