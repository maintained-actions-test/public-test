name: chart-testing-action
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  chart-testing-action-main:
    name: Helm Chart Testing (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v4.3.1
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          check-latest: true
      - name: Set up chart-testing
        uses: step-security/chart-testing-action@main
        with:
          version: "3.14.0"
      - name: Verify ct installation
        run: ct version
