name: cocogitto-action
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  cocogitto-action-main:
    name: Cocogitto (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Cocogitto
        uses: step-security/cocogitto-action@release
        with:
          install-only: "true"

