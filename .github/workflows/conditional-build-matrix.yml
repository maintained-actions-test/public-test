name: conditional-build-matrix
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  conditional-build-matrix-main:
    name: Conditional Build Matrix (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Conditional Build Matrix
        id: conditional-build-matrix-main
        uses: step-security/conditional-build-matrix@main
        with:
          inputFile: .github/workflows/matrix_includes.json
          filter: "[?runOn == 'always']"
          addInclude: true
      - name: Print Conditional Build Matrix Output
        run: |
          echo "Matrix Output: ${{ steps.conditional-build-matrix-main.outputs.matrix }}"
          echo "Raw outputs: ${{ steps.conditional-build-matrix-main.outputs }}"
