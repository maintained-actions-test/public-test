name: configure-aws-credentials
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  id-token: write
jobs:
  configure-aws-credentials-main:
    name: Configure AWS Credentials (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS Credentials
        id: aws-credentials-main
        uses: step-security/configure-aws-credentials@main
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1
      - name: Print AWS Credentials Output
        run: |
          echo "AWS Account ID: ${{ steps.aws-credentials-main.outputs.aws-account-id }}"
          echo "AWS Expiration: ${{ steps.aws-credentials-main.outputs.aws-expiration }}"
          echo "Authentication successful!"
