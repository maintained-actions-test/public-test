name: conventional-commit-checker-action

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-commit-convention:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Validate PR title and body
        uses: step-security/conventional-commit-checker-action@main
