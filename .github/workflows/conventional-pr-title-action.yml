name: conventional pr title action

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - uses: step-security/conventional-pr-title-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
