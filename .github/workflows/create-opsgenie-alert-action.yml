name: create-opsgenie-alert-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Create OpsGenie alert
        uses: step-security/create-opsgenie-alert-action@release
        with:
          api_key: any
          message: "Smoke test alert from public-test"
          priority: P5
          tags: smoke-test
