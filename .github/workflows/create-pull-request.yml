name: create-pull-request

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-published-create-pull-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create test change
        run: |
          echo "main action test - $(date +%s)" > report.txt
      - name: Call create-pull-request with @main
        id: cpr-main
        uses: step-security/create-pull-request@main
        with:
          commit-message: '[CI] main create-pull-request test'
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          title: '[CI] main create-pull-request test'
          body: |
            ✅ This PR was created by a workflow_dispatch integration test using @main.
            Auto-generated by [create-pull-request][1]
            [1]: https://github.com/step-security/create-pull-request
          branch: ci-test-main-${{ github.run_id }}

