name: devcontainers-ci
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  packages: write
env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devcontainer-test
  IMAGE_TAG: run-${{ github.run_id }}
  IMAGE_TAG_MAIN: run-${{ github.run_id }}-main
jobs:
  build-amd64-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create devcontainer config
        run: |
          mkdir -p test/.devcontainer
          cat > test/.devcontainer/devcontainer.json <<'EOF'
          {
            "name": "test",
            "image": "mcr.microsoft.com/devcontainers/base:ubuntu"
          }
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push devcontainer (linux/amd64)
        uses: step-security/devcontainers-ci@release
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ env.IMAGE_TAG_MAIN }}
          subFolder: test
          platform: linux/amd64
          useNativeRunner: 'true'
          push: always
  build-arm64-main:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create devcontainer config
        run: |
          mkdir -p test/.devcontainer
          cat > test/.devcontainer/devcontainer.json <<'EOF'
          {
            "name": "test",
            "image": "mcr.microsoft.com/devcontainers/base:ubuntu"
          }
          EOF
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push devcontainer (linux/arm64)
        uses: step-security/devcontainers-ci@release
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ env.IMAGE_TAG_MAIN }}
          subFolder: test
          platform: linux/arm64
          useNativeRunner: 'true'
          push: always
  merge-main:
    needs: [build-amd64-main, build-arm64-main]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge per-platform images into multi-arch manifest
        uses: step-security/devcontainers-ci/merge@release
        with:
          imageName: ${{ env.IMAGE_NAME }}
          imageTag: ${{ env.IMAGE_TAG_MAIN }}
          platforms: linux/amd64,linux/arm64
