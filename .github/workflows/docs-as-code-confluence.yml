name: docs-as-code-confluence

on:
  workflow_dispatch:

jobs:
  publish-docs-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create sample docs
        run: |
          mkdir -p docs
          echo "# Hello Confluence" > docs/README.md
          echo "This page was published by GitHub Actions 🎉" >> docs/README.md

      - name: Publish to Confluence using @main
        uses: step-security/docs-as-code-confluence@main
        with:
          folder: docs
          username: 
          password: 
          confluence-base-url: 
          space-key: 
          parent-page-id: 
          
