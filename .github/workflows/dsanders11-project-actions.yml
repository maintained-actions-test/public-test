name: dsanders11-project-actions

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  setup-issues:
    name: setup - create test issues
    runs-on: ubuntu-latest
    outputs:
      url1: ${{ steps.setup.outputs.url1 }}
      url2: ${{ steps.setup.outputs.url2 }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          url1=$(gh issue create -R "${{ github.repository }}" \
            --title "[project-actions ${{ github.run_id }}] archive target" \
            --body "Auto-created issue for archive-item test")
          url2=$(gh issue create -R "${{ github.repository }}" \
            --title "[project-actions ${{ github.run_id }}] delete target" \
            --body "Auto-created issue for delete-item test")
          echo "Created: $url1 / $url2"
          echo "url1=$url1" >> "$GITHUB_OUTPUT"
          echo "url2=$url2" >> "$GITHUB_OUTPUT"

  setup-source-project:
    name: setup - create source project
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.create.outputs.number }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: create
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          out=$(gh project create \
            --owner "${{ github.repository_owner }}" \
            --title "throwaway-src-${{ github.run_id }}" \
            --format json)
          echo "$out"
          number=$(echo "$out" | jq -r '.number')
          echo "Source project number: $number"
          echo "number=$number" >> "$GITHUB_OUTPUT"

  github-script:
    name: github-script
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/github-script@main
        with:
          script: core.info('hello from project-actions/github-script')

  get-project:
    name: get-project
    needs: setup-source-project
    runs-on: ubuntu-latest
    outputs:
      title: ${{ steps.run.outputs.title }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: run
        uses: step-security/dsanders11-project-actions/get-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.setup-source-project.outputs.number }}

  find-project:
    name: find-project
    needs: get-project
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/find-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          title: ${{ needs.get-project.outputs.title }}

  find-workflow:
    name: find-workflow
    needs: setup-source-project
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.run.outputs.number }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: run
        uses: step-security/dsanders11-project-actions/find-workflow@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.setup-source-project.outputs.number }}
          name: Item added to project

  get-workflow:
    name: get-workflow
    needs: [setup-source-project, find-workflow]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/get-workflow@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.setup-source-project.outputs.number }}
          number: ${{ needs.find-workflow.outputs.number }}

  copy-project:
    name: copy-project
    needs: setup-source-project
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.run.outputs.number }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - id: run
        uses: step-security/dsanders11-project-actions/copy-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.setup-source-project.outputs.number }}
          title: throwaway-copy-${{ github.run_id }}

  edit-project:
    name: edit-project
    needs: copy-project
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/edit-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          description: edited by workflow run ${{ github.run_id }}

  link-project:
    name: link-project
    needs: copy-project
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/link-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          repository: ${{ github.repository }}

  completed-by:
    name: completed-by
    needs: copy-project
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/completed-by@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          field-value: Done

  add-item-archive:
    name: add-item (archive target)
    needs: [copy-project, setup-issues]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/add-item@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          content-url: ${{ needs.setup-issues.outputs.url1 }}

  get-item:
    name: get-item
    needs: [copy-project, setup-issues, add-item-archive]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/get-item@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          item: ${{ needs.setup-issues.outputs.url1 }}

  edit-item:
    name: edit-item
    needs: [copy-project, setup-issues, get-item]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/edit-item@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          item: ${{ needs.setup-issues.outputs.url1 }}
          field: Status
          field-value: Done

  archive-item:
    name: archive-item
    needs: [copy-project, setup-issues, edit-item]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/archive-item@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          item: ${{ needs.setup-issues.outputs.url1 }}

  add-item-delete:
    name: add-item (delete target)
    needs: [copy-project, setup-issues]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/add-item@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          content-url: ${{ needs.setup-issues.outputs.url2 }}

  delete-item:
    name: delete-item
    needs: [copy-project, setup-issues, add-item-delete]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/delete-item@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          item: ${{ needs.setup-issues.outputs.url2 }}

  close-project:
    name: close-project
    needs: [copy-project, archive-item, delete-item, edit-project, link-project, completed-by]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/close-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}
          closed: "true"

  delete-project:
    name: delete-project (cleanup copy)
    needs: [copy-project, close-project]
    if: always() && needs.copy-project.outputs.number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: step-security/dsanders11-project-actions/delete-project@main
        with:
          token: ${{ secrets.PROJECT_PAT }}
          project-number: ${{ needs.copy-project.outputs.number }}

  cleanup:
    name: cleanup (source project + issues)
    needs:
      - setup-issues
      - setup-source-project
      - github-script
      - get-project
      - find-project
      - find-workflow
      - get-workflow
      - copy-project
      - edit-project
      - link-project
      - completed-by
      - add-item-archive
      - get-item
      - edit-item
      - archive-item
      - add-item-delete
      - delete-item
      - close-project
      - delete-project
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Delete source project
        if: needs.setup-source-project.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECT_PAT }}
        run: |
          gh project delete "${{ needs.setup-source-project.outputs.number }}" \
            --owner "${{ github.repository_owner }}" || true
      - name: Close test issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [ -n "${{ needs.setup-issues.outputs.url1 }}" ] && \
            gh issue close "${{ needs.setup-issues.outputs.url1 }}" --reason completed || true
          [ -n "${{ needs.setup-issues.outputs.url2 }}" ] && \
            gh issue close "${{ needs.setup-issues.outputs.url2 }}" --reason completed || true
