name: file-changes-action

on:
  workflow_dispatch:

jobs:
  file-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: File Changes Action
        id: file_changes
        uses: step-security/file-changes-action@release
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Show outputs
        run: |
          echo "files: ${{ steps.file_changes.outputs.files }}"
          echo "files_added: ${{ steps.file_changes.outputs.files_added }}"
          echo "files_modified: ${{ steps.file_changes.outputs.files_modified }}"
          echo "files_removed: ${{ steps.file_changes.outputs.files_removed }}"
