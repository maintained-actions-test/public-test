name: file-changes-action

on:
  workflow_dispatch:
    inputs:
      prNumber:
        description: 'PR number to get file changes from'
        required: false
        default: 29

jobs:
  file-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: File Changes Action
        id: file_changes
        uses: step-security/file-changes-action@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          githubRepo: ${{ github.repository }}
          prNumber: ${{ github.event.inputs.prNumber }}
          output: json
          fileOutput: json

      - name: Show outputs
        run: |
          echo "files: ${{ steps.file_changes.outputs.files }}"
          echo "files_added: ${{ steps.file_changes.outputs.files_added }}"
          echo "files_modified: ${{ steps.file_changes.outputs.files_modified }}"
          echo "files_removed: ${{ steps.file_changes.outputs.files_removed }}"
