name: gajira-create
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  gajira-create-main:
    name: Create Jira Issue (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create Jira Issue (@main)
        uses: step-security/gajira-create@main
        with:
          project: "KAN"
          issuetype: "Task"
          summary: "Test Issue from GitHub Actions"
