name: ghaction-setup-containerd

on:
  workflow_dispatch:

jobs:
  containerd-test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up containerd
        uses: step-security/ghaction-setup-containerd@main

      - name: Verify containerd version
        run: containerd --version

      #######################################
      # 🧪 Test Case 1: Pull existing image
      #######################################
      - name: Pull Docker image using containerd
        run: |
          sudo ctr i pull --all-platforms --all-metadata docker.io/library/hello-world:latest

      - name: List pulled images
        run: sudo ctr i ls

      #######################################
      # 🧪 Test Case 2: Build and push image
      #######################################
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build fresh image and export as tarball
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: type=oci,dest=/tmp/custom-image.tar
          tags: docker.io/${{ secrets.DOCKER_USERNAME }}/custom-image-test:latest

      - name: Import built image into containerd
        run: sudo ctr i import --digests --all-platforms /tmp/custom-image.tar

      - name: Push image to Docker Hub
        run: |
          sudo ctr i push \
            --user "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" \
            docker.io/${{ secrets.DOCKER_USERNAME }}/custom-image-test:latest
