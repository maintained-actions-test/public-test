name: ghaction-upx

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install UPX
        uses: step-security/ghaction-upx@main
        with:
          install-only: true

      - name: Verify UPX
        run: upx --version
