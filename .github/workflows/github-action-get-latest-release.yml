name: github-action-get-latest-release

on:
  workflow_dispatch:


jobs:
  build:
    name: Test with @main without dynamic uses
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Direct 1 — repository and token
        id: direct1
        uses: step-security/github-action-get-latest-release@main
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}

