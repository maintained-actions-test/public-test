name: github-action-matrix-outputs-write
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
  actions: write
jobs:
  matrix-outputs-write-main:
    name: Matrix Outputs Write (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Write Matrix Outputs
        id: write
        uses: step-security/github-action-matrix-outputs-write@release
        with:
          matrix-step-name: build
          matrix-key: ubuntu-latest
          outputs: |
            result: success
            version: "1.0.0"
      - name: Print outputs
        run: |
          echo "Result: ${{ steps.write.outputs.result }}"
