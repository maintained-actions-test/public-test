name: github-action-required-labels

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Check Required Labels
        uses: step-security/github-action-required-labels@main
        with:
          mode: minimum
          count: 1
          labels: |
            branch: main
            test: s
