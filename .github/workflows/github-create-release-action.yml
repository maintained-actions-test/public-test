name: github-create-release-action

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create'
        required: true
        default: 'v1.2.3'
      message:
        description: 'Release message'
        required: false
        default: 'Test release message'

jobs:
  test-release-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
      - name: Delete existing tag if exists
        run: |
          TAG="${{ github.event.inputs.tag }}-main"
          if git tag -l | grep -q "^${TAG}$"; then
            echo "Deleting existing tag: $TAG"
            git tag -d "$TAG"
            git push origin --delete "$TAG" || echo "Remote tag doesn't exist"
          else
            echo "Tag $TAG doesn't exist, nothing to delete"
          fi
      - name: Create and push tag (with @main)
        id: create-tag
        env:
          TAG: ${{ github.event.inputs.tag }}-main
        run: |
          git tag -a "$TAG" -m "${{ github.event.inputs.message }} (main branch test)"
          git push origin "$TAG"
      - name: Extract tag annotation
        id: tag-annotation
        run: |
          annotation=$(git for-each-ref --format="%(contents)" refs/tags/${{ github.event.inputs.tag }}-main)
          echo "git-tag-annotation<<EOF" >> $GITHUB_OUTPUT
          echo "$annotation" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub release using custom action (with @main)
        id: release
        uses: step-security/github-create-release-action@main
        with:
          created_tag: ${{ github.event.inputs.tag }}-main
          version_regex: ^v[[:digit:]]+\.[[:digit:]]+\.[[:digit:]]+.*$
          release_text: ${{ steps.tag-annotation.outputs.git-tag-annotation }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release was created
        run: |
          echo "Checking if release was created for tag: ${{ github.event.inputs.tag }}"
          gh release view "${{ github.event.inputs.tag }}" --json id,url,uploadUrl,body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
