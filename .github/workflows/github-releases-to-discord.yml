name: github-releases-to-discord

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  github-releases-to-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: GitHub Releases to Discord
        uses: step-security/github-releases-to-discord@release
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          release_name: Test Release v1.0.0
          release_body: "This is a test release body with some changes."
          release_html_url: https://github.com/step-security/github-releases-to-discord/releases/tag/v1.0.0
          username: Release Changelog
          color: "2105893"
