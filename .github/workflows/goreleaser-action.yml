name: goreleaser-action
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  goreleaser-main:
    name: GoReleaser Action (main)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
      - name: Run GoReleaser
        uses: step-security/goreleaser-action@release
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true
      - name: Verify GoReleaser installed
        run: goreleaser --version
