name: http-request-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  http-request-action:
    name: http-request-action
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run http-request-action
        uses: step-security/http-request-action@release
        with:
          url: https://httpbin.org/get
          method: GET
