name: http-request-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  http-request-action:
    name: http-request-action
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run http-request-action
        id: http
        uses: step-security/http-request-action@main
        with:
          url: https://api.github.com/zen
          method: GET

      - name: Verify output
        run: |
          echo "Status: ${{ steps.http.outputs.status }}"
          echo "Response: ${{ steps.http.outputs.response }}"
