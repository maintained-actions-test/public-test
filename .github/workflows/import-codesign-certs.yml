name: import-codesign-certs

on:
  workflow_dispatch:

jobs:
  test-import-certs:
    runs-on: macos-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Generate self-signed test p12
        id: gen
        run: |
          set -euo pipefail
          PASS="testpass"
          openssl req -x509 -newkey rsa:2048 \
            -keyout key.pem -out cert.pem \
            -days 1 -nodes \
            -subj '/CN=Test Code-Signing Certificate'
          openssl pkcs12 -export \
            -inkey key.pem -in cert.pem \
            -out test.p12 \
            -password "pass:$PASS"
          P12_B64=$(base64 -i test.p12)
          echo "p12-password=$PASS" >> "$GITHUB_OUTPUT"
          echo "p12-base64<<EOF" >> "$GITHUB_OUTPUT"
          echo "$P12_B64" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Import code-signing certificate
        uses: step-security/import-codesign-certs@main
        with:
          p12-file-base64: ${{ steps.gen.outputs.p12-base64 }}
          p12-password: ${{ steps.gen.outputs.p12-password }}

      - name: Verify imported identities
        run: security find-identity -v
