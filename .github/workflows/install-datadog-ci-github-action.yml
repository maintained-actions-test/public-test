name: install-datadog-ci-github-action
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  install-datadog-ci-main:
    name: Install datadog-ci (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install datadog-ci
        uses: step-security/install-datadog-ci-github-action@main
        with:
          version: "v5"
          github-token: ${{ secrets.GITHUB_TOKEN }}
