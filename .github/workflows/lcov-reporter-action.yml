name: lcov-reporter-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run lcov-reporter-action
        uses: step-security/lcov-reporter-action@release
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
