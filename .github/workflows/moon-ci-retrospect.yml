name: moon-ci-retrospect

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  moon-ci-retrospect:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Moonrepo Toolchain
        uses: moonrepo/setup-toolchain@v0
        continue-on-error: true

      - name: Run CI pipeline
        run: moon ci
        continue-on-error: true

      - name: Collect and display moon CI results
        uses: step-security/moon-ci-retrospect@release
        if: success() || failure()
