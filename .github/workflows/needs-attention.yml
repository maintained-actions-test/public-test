name: needs-attention

on:
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  needs-attention:
    name: needs-attention
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.issue.labels.*.name, 'Needs Author Feedback') }}
    steps:
      - uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run needs-attention
        id: action
        uses: step-security/needs-attention@release
        with:
          repo-token: ${{ github.token }}
          perform: false

      - name: Verify output
        run: echo "Result: ${{ steps.action.outputs.result }}"
