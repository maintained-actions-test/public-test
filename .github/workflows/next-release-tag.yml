name: next-release-tag
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: write
jobs:
  next-release-tag-main:
    name: Next Release Tag (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate Next Release Tag
        uses: step-security/next-release-tag@release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "workflow-test-"
          tag_template: "yyyy.mm.dd.i"
          previous_tag: "workflow-test-2026.07.01.1"
