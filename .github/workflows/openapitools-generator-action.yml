name: openapitools-generator-action
on: 
  workflow_dispatch:

jobs:
    open-api:
        runs-on: ubuntu-latest
        steps:  

          - name: Checkout repository
            uses: actions/checkout@v5
    
          - name: Open api generator
            uses: step-security/openapitools-generator-action@main
            with: 
                generator: rust
