name: pip-action

on: 
  workflow_dispatch:

jobs:
  functionality:
    name: Functionality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install pip packages
      uses: step-security/pip-action@main
      with:
        packages: |
          pip-install-test
          pip-install-test
