name: pr-conventional-commits

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: PR Conventional Commit Validation
        uses: step-security/pr-conventional-commits@main
        with:
          task_types: '["feat","fix","docs","test","ci","refactor","perf","chore","revert","trigger"]'
          add_label: 'true'
          token: ${{ secrets.GITHUB_TOKEN }}
