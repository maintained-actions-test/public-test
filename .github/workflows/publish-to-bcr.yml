name: publish-to-bcr

on:
  workflow_dispatch:

jobs:
  publish-to-bcr-main:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish to BCR
        uses: step-security/publish-to-bcr@main
        with:
          local-registry: "."
          module-version: "0.0.0-test"
          templates-dir: ".bcr"
