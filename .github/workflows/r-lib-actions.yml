name: r-lib-actions

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-pandoc:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Install and print pandoc version
        uses: step-security/r-lib-actions/setup-pandoc@main
        with:
          pandoc-version: latest

      - run: pandoc --version

  setup-tinytex:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Install tinytex and print tlmgr version
        uses: step-security/r-lib-actions/setup-tinytex@main

      - run: tlmgr --version
      - run: tlmgr update --self
      - run: tlmgr --version
      - run: tlmgr install colortbl grfext ae

  setup-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install packages using setup-manifest
        uses: step-security/r-lib-actions/setup-manifest@main

  setup-renv:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup R
        uses: step-security/r-lib-actions/setup-r@main

      - name: Install from renv.lock
        env:
          RENV_CONFIG_INSTALL_PARALLEL: "FALSE"
        uses: step-security/r-lib-actions/setup-renv@main
        with:
          working-directory: ./myRpackage

  install-R:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Install and print R version
        uses: step-security/r-lib-actions/setup-r@main
        with:
          r-version: latest

      - run: R --version

  install-R-dependecies:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup R
        uses: step-security/r-lib-actions/setup-r@main

      - name: Install R dependencies
        uses: step-security/r-lib-actions/setup-r-dependencies@main
        with:
          extra-packages: any::rcmdcheck
          working-directory: ./myRpackage

  Check-R-package:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup R
        uses: step-security/r-lib-actions/setup-r@main

      - name: Setup R dependencies
        uses: step-security/r-lib-actions/setup-r-dependencies@main
        with:
          working-directory: ./myRpackage
          extra-packages: any::rcmdcheck

      - name: Check R package
        uses: step-security/r-lib-actions/check-r-package@main
        with:
          working-directory: ./myRpackage
