name: release-drafter

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test-root-action-direct:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Release Drafter (Root action, direct)
        uses: step-security/release-drafter@main
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-drafter-action-direct:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Release Drafter (Drafter, direct)
        uses: step-security/release-drafter/drafter@main
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
