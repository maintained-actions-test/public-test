name: release-on-push-action
on: 
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
    create-release:
        runs-on: ubuntu-latest
        steps:
            - name: Create release
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              uses: step-security/release-on-push-action@main
              with: 
                bump_version_scheme: norelease
