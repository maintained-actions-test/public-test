name: set-commit-status-action

on:
  workflow_dispatch:

permissions:
  statuses: write

jobs:
  set-commit-status:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Set commit status
        uses: step-security/set-commit-status-action@release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          status: success
          context: Test Status
          description: Test commit status
          sha: 5d0d79fcd531b604576b9afa9829ab291ac67b4e
