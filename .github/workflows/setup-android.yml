name: setup-android

on:
  workflow_dispatch:

jobs:
  runSdkManager:
    name: setup-android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run setup-android
        uses: step-security/setup-android@main
        with:
          log-accepted-android-sdk-licenses: 'false'

      - name: Verify installed SDK packages
        run: sdkmanager --list_installed
        shell: bash

      - name: Verify available SDK packages
        run: sdkmanager --list
        shell: bash

      - name: Verify adb
        run: adb version
        shell: bash
