name: setup-bazelisk

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup bazelisk
        uses: step-security/setup-bazelisk@main
        with:
          bazelisk-version: "1.20.0"

      - name: Verify bazelisk version
        env:
          USE_BAZEL_VERSION: "7.0.0"
        run: |
          bazel version | tee /tmp/v.txt
          grep "Bazelisk version: v1.20.0" /tmp/v.txt
          grep "Build label: 7.0.0" /tmp/v.txt
