name: setup-gh

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup gh
        uses: step-security/setup-gh@main
        with:
          gh-version: "2.50.0"
          token: ""

      - name: Verify gh CLI version
        run: |
          gh --version
          gh --version | grep "gh version 2.50.0" || (echo "Expected gh 2.50.0, got different version" && exit 1)
