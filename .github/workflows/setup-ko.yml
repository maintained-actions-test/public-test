name: setup-ko

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-ko:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23.x'

      - uses: step-security/setup-ko@main

      - run: ko version
