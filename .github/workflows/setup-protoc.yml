name: setup-protoc

on:
  workflow_dispatch:

jobs:
  Protoc-main:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Install Protoc
        uses: step-security/setup-protoc@main

      - run: protoc --version
