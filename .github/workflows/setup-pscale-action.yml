name: setup-pscale-action
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  setup-pscale-main:
    name: Setup PlanetScale CLI (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pscale
        uses: step-security/setup-pscale-action@release
        with:
          version: "latest"
          github-token: ${{ secrets.GITHUB_TOKEN }}
