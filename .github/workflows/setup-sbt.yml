name: setup-sbt

on:
    workflow_dispatch:

jobs:
  setup-sbt-main:
    runs-on: ubuntu-latest
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@rc
      with:
        egress-policy: audit

    - uses: actions/checkout@v6

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Setup sbt
      uses: step-security/setup-sbt@release

    - name: Verify sbt
      shell: bash
      run: sbt --version
