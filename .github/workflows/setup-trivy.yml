name: setup-trivy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-setup-trivy:
    name: Install + verify Trivy
    runs-on: ubuntu-latest

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Trivy
        uses: step-security/setup-trivy@main
        with:
          version: v0.68.2
          cache: true

      - name: Verify Trivy is installed
        shell: bash
        run: |
          set -euo pipefail
          which trivy
          trivy --version
          trivy --help >/dev/null
