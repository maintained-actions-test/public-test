name: size-label-action

on:
  pull_request:
    branches:
      - main
    paths:
      - 'testdata/size-label-action/test-change.txt'

permissions:
  contents: write
  pull-requests: write

jobs:
  size-label-action-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run size-label-action
        uses: step-security/size-label-action@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup - close PR and delete branch
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          gh pr close "$PR_NUM" \
            --delete-branch \
            --comment "Functional test complete for size-label-action."
