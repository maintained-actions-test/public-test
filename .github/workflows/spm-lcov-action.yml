name: spm-lcov-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install llvm (for llvm-cov used by cov.sh)
        run: sudo apt-get install -y llvm
        working-directory: .

      - name: Run spm-lcov-action
        uses: step-security/spm-lcov-action@release
