name: static-web-apps-deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Run static-web-apps-deploy (version dry-run)
        uses: step-security/static-web-apps-deploy@release
        with:
          action: "version"
          azure_static_web_apps_api_token: "dummy-token"
          app_location: "testdata/static-web-apps-deploy"
