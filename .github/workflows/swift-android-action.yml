name: swift-android-action
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04']
        swift-version: ['nightly-main']
        ndk-version: ['latest']
    steps:
      - name: Checkout apple/swift-algorithms
        uses: actions/checkout@v6
        with:
          repository: apple/swift-algorithms
          path: apple/swift-algorithms
      - name: Test apple/swift-algorithms
        uses: step-security/swift-android-action@main
        with:
          package-path: apple/swift-algorithms
          swift-version: ${{ matrix.swift-version }}
          ndk-version: ${{ matrix.ndk-version }}
          free-disk-space: true
          run-tests: ${{ env.RUNNER_ARCH != 'ARM64' }}

