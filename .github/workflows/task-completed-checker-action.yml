name: task-completed-checker-action

on:
  pull_request:
    types: [opened, edited]

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  task-check:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Add completed task list to PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const taskList = '## Tasks\n- [x] Review changes\n- [x] Run tests\n- [x] Update docs';
            if (!pr.body || !pr.body.includes('- [x] Review changes')) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: taskList + (pr.body ? '\n\n' + pr.body : ''),
              });
            }

      - name: Check tasks completed
        uses: step-security/task-completed-checker-action@release
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
