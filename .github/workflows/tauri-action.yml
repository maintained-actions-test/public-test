name: tauri-action

on:
  workflow_dispatch:
    inputs:
      action-tag:
        description: "Tag for the action"
        required: true
        default: "main"

permissions:
  contents: write

jobs:
  tauri-action-dynamic:
    name: Tauri Action (dynamic)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate Icons
        run: |
          mkdir -p src-tauri/icons
          BASE_URL="https://raw.githubusercontent.com/tauri-apps/tauri-action/dev/.github/fixtures/example-with-tauri-v2/src-tauri/icons"
          curl -sL "$BASE_URL/32x32.png" -o src-tauri/icons/32x32.png
          curl -sL "$BASE_URL/128x128.png" -o src-tauri/icons/128x128.png
          curl -sL "$BASE_URL/128x128@2x.png" -o "src-tauri/icons/128x128@2x.png"
          curl -sL "$BASE_URL/icon.icns" -o src-tauri/icons/icon.icns
          curl -sL "$BASE_URL/icon.ico" -o src-tauri/icons/icon.ico

      - name: Build Tauri App
        uses: step-security/dynamic-uses@v1
        with:
          uses: step-security/tauri-action@${{ github.event.inputs.action-tag }}
          with: |
            {
              "projectPath": ".",
              "args": ""
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tauri-action-main:
    name: Tauri Action (main)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Generate Icons
        run: |
          mkdir -p src-tauri/icons
          BASE_URL="https://raw.githubusercontent.com/tauri-apps/tauri-action/dev/.github/fixtures/example-with-tauri-v2/src-tauri/icons"
          curl -sL "$BASE_URL/32x32.png" -o src-tauri/icons/32x32.png
          curl -sL "$BASE_URL/128x128.png" -o src-tauri/icons/128x128.png
          curl -sL "$BASE_URL/128x128@2x.png" -o "src-tauri/icons/128x128@2x.png"
          curl -sL "$BASE_URL/icon.icns" -o src-tauri/icons/icon.icns
          curl -sL "$BASE_URL/icon.ico" -o src-tauri/icons/icon.ico

      - name: Build Tauri App
        uses: step-security/tauri-action@main
        with:
          projectPath: "."
          args: ""
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
