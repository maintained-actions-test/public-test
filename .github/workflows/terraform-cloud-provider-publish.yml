name: terraform-cloud-provider-publish

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Create dummy provider manifest
        run: |
          cat > terraform-provider-test_1.0.0_manifest.json <<'EOF'
          {
            "metadata": {
              "protocol_versions": ["5.0"]
            }
          }
          EOF

      - name: provider
        uses: step-security/terraform-cloud-provider-publish@main
        with:
          organization-name: workflow
          gpg-key: any
          organization-api-token: any
