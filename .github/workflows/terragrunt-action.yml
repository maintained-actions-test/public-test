name: terragrunt-action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Terragrunt and OpenTofu
        uses: step-security/terragrunt-action@release
        with:
          tg_version: '0.82.3'
          tofu_version: '1.10.1'
          github_token: ${{ secrets.GITHUB_TOKEN }}
