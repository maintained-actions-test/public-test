name: test-visibility-github-action
on:
  workflow_dispatch:
    inputs: {}
permissions:
  contents: read
jobs:
  test-visibility-main:
    name: Configure Datadog Test Visibility (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Datadog Test Visibility
        uses: step-security/test-visibility-github-action@main
        with:
          languages: "js"
          api_key: ${{ secrets.DATADOG_API_KEY }}
          service: "workflow-playground"
