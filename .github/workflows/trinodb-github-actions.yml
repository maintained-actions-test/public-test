name: trinodb-github-actions
on:
  pull_request:
  issue_comment:
    types: [created]
permissions:
  contents: read
  checks: write
  pull-requests: write
jobs:
  # action-surefire-report
  surefire-report-main:
    name: Surefire Report (main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.21.x
      - name: Generate test report
        run: |
          cd integration-tests/go &&
            go install github.com/jstemmer/go-junit-report/v2@latest &&
            go test -v 2>&1 ./... |
            go-junit-report -out report.xml
      - name: Surefire Report
        uses: step-security/trinodb-github-actions/action-surefire-report@main
        with:
          check_name: "Trino Surefire Report (main)"
          report_paths: "integration-tests/go/report.xml"
          fail_on_test_failures: "false"
          fail_if_no_tests: "false"
  # block-commits (only runs on pull_request — action requires PR context)
  block-commits-main:
    name: Block Commits (main)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Block Commits
        uses: step-security/trinodb-github-actions/block-commits@main
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          action-merge: none
          action-fixup: none
  # checkout-and-setup
  checkout-and-setup-main:
    name: Checkout and Setup (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout and Setup
        uses: step-security/trinodb-github-actions/checkout-and-setup@main
        with:
          java-version: 17
          cache: ""
  # github-app-token
  github-app-token-main:
    name: GitHub App Token (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Generate App Token
        continue-on-error: true
        uses: step-security/trinodb-github-actions/github-app-token@main
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}
  # slash-command-dispatch (only runs on issue_comment — action requires that context)
  slash-command-dispatch-main:
    name: Slash Command Dispatch (main)
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Slash Command Dispatch
        continue-on-error: true
        uses: step-security/trinodb-github-actions/slash-command-dispatch@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commands: test
          permission: write
          issue-type: both
