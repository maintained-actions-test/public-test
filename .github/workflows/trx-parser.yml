name: trx-parser

on:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  trx-parser-main:
    name: TRX Parser (main)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse TRX Results
        uses: step-security/trx-parser@release
        with:
          TRX_PATH: "testdata/trx-parser/TestResults"
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IGNORE_FAILURE: "true"
