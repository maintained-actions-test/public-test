name: unity-builder
on:
  workflow_dispatch:
    inputs: {}
jobs:
  build-main:
    name: Build with @main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Build Unity project
        id: build
        continue-on-error: true
        uses: step-security/unity-builder@main
        with:
          targetPlatform: StandaloneLinux64
          projectPath: test-project
          unityVersion: 2021.3.45f1
          versioning: None
          skipActivation: 'true'
      - name: Check build outcome
        run: echo "Build step outcome=${{ steps.build.outcome }}"
