name: "vitest-coverage-report-action"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vitest-coverage-report-action:
    name: vitest-coverage-report-action
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: step-security/harden-runner@rc
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run vitest-coverage-report-action
        uses: step-security/vitest-coverage-report-action@release
        with:
          working-directory: "./test/mockReports"
          json-summary-path: "coverage/coverage-summary.json"
          json-final-path: "coverage/coverage-final.json"
          file-coverage-mode: "all"
          comment-on: "commit"
