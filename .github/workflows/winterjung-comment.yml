name: winterjung-comment

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  subscription-check:
    name: Subscription Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6

      - name: Create test issue
        id: create-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create --repo ${{ github.repository }} --title "Test winterjung-comment action" --body "Automated test issue" | tail -1)
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -o '[0-9]*$')
          echo "issue-number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Create comment
        id: create-comment
        uses: step-security/winterjung-comment@release
        with:
          type: create
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_number: ${{ steps.create-issue.outputs.issue-number }}
          body: "Test comment from winterjung-comment action"

      - name: Print outputs
        run: |
          echo "id: ${{ steps.create-comment.outputs.id }}"
          echo "body: ${{ steps.create-comment.outputs.body }}"

      - name: Close test issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ steps.create-issue.outputs.issue-number }} --repo ${{ github.repository }}
