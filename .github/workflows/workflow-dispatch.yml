name: workflow-dispatch

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  testAction:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Invoke Echo
        uses: step-security/workflow-dispatch@main
        with: 
           workflow: "workflow-dispatch-test.yml"
           inputs: "{ \"message\": \"blah blah this is a test\" }"

  testPendingStatus-main:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Dispatch with wait and sync (pending fix included)
        uses: step-security/workflow-dispatch@main
        with:
          workflow: "workflow-dispatch-test.yml"
          inputs: '{ "message": "testing pending status with @main (should pass)" }'
          wait-for-completion: true
          sync-status: true
          wait-timeout-seconds: 60

  testPendingStatus-v1-3-2:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Dispatch with wait and sync (no pending fix - expect failure if pending occurs)
        uses: step-security/workflow-dispatch@v1.3.2
        continue-on-error: true
        with:
          workflow: "workflow-dispatch-test.yml"
          inputs: '{ "message": "testing pending status with v1.3.2 (should fail if pending)" }'
          wait-for-completion: true
          sync-status: true
          wait-timeout-seconds: 60
